<!DOCTYPE html>
<html lang="pt/br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-22RPMRWV3T"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-22RPMRWV3T');
    </script>


    <title>Quiz 1</title>
    <link rel="icon" type="ico" href="../assets/icons/Poppop.ico">

<style>
body{
background:#f5f5f5;
font-family:system-ui, sans-serif;
margin:0;
padding:80px 20px;
}

.quiz-window{
background:#fff04d;
border:5px solid black;
box-shadow:12px 12px 0 black;
max-width:900px;
margin:auto;
padding:60px;
}

.quiz-window h1{
font-size:40px;
text-align: center;
margin-bottom:40px;
max-height:80vh;
overflow-y:auto;
}

.question{
margin-bottom:28px;
}

.question p{
font-weight:700;
font-size:20px;
margin-bottom:10px;
}

.question label{
display:block;
margin-bottom:6px;
font-size:18px;
cursor:pointer;
}

.question input{
margin-right:8px;
}

.correto::after{
content:" ✔";
color:green;
margin-left:6px;
}

.errado::after{
content:" ✖";
color:red;
margin-left:6px;
}

.verificarquiz{
margin-top:30px;
background:#4DA6FF;
border:4px solid black;
padding:15px 25px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:8px 8px 0 black;
transition:0.15s;
}

.verificarquiz:hover{
transform:translateY(-2px);
box-shadow:12px 12px 0 black;
}

.verificarquiz:active {
transform: translate(4px, 4px);
box-shadow: 2px 2px 0 black;
}
</style>
</head>

<body>

<section class="quiz-page">

<div class="quiz-window">

<h1>Teste seu conhecimento</h1>

<form class="quiz-form" id="quizForm">

<div class="question">
<p>1. I ___ from Brazil.</p>
<label><input type="radio" name="q1" value="am"> am</label>
<label><input type="radio" name="q1" value="is"> is</label>
<label><input type="radio" name="q1" value="are"> are</label>
<label><input type="radio" name="q1" value="be"> be</label>
</div>

<div class="question">
<p>2. She ___ coffee every morning.</p>
<label><input type="radio" name="q2" value="drink"> drink</label>
<label><input type="radio" name="q2" value="drinks"> drinks</label>
<label><input type="radio" name="q2" value="drinking"> drinking</label>
<label><input type="radio" name="q2" value="drank"> drank</label>
</div>

<button type="button" class="verificarquiz" onclick="verificarQuiz()">
Verificar respostas
</button>

</form>

</div>
</section>

<script>
function verificarQuiz(){

    const respostasCorretas = {
        q1: "am",
        q2: "drinks"
    };

    let score = 0;

    Object.keys(respostasCorretas).forEach(q => {

        const selecionado = document.querySelector(`input[name="${q}"]:checked`);

        const labels = document.querySelectorAll(`input[name="${q}"]`);

        labels.forEach(input => {
            input.parentElement.classList.remove("correto", "errado");
        });

        if(selecionado){

            if(selecionado.value === respostasCorretas[q]){
                selecionado.parentElement.classList.add("correto");
                score++;
            } else {
                selecionado.parentElement.classList.add("errado");

                // mostrar qual é a correta
                labels.forEach(input => {
                    if(input.value === respostasCorretas[q]){
                        input.parentElement.classList.add("correto");
                    }
                });
            }

        }
    });

    setTimeout(() => {
        alert(`Você acertou ${score}/2`);
        window.location.href = "dashboard.html";
    }, 500);
}
</script>

</body>
</html>
