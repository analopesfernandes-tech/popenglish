<!DOCTYPE html>
<html lang="pt/br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-22RPMRWV3T"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-22RPMRWV3T');
    </script>


    <title>PopEnglish</title>
    <link rel="icon" type="ico" href="assets/icons/Poppop.ico">
    <link rel="stylesheet" href="index.css">


  <style>
    /* =========================
    BASE
    ========================= */

    body {
      background: #f5f5f5;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 80px 20px;
    }

    /* =========================
    CAIXA PRINCIPAL
    ========================= */

    .quiz-window {
      background: #fff04d;
      border: 5px solid black;
      box-shadow: 12px 12px 0 black;
      max-width: 800px;
      margin: auto;
      padding: 60px;
      text-align: center;
    }

    /* =========================
    TÍTULO
    ========================= */

    .quiz-window h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    /* =========================
    TEXTO
    ========================= */

    .quiz-window p {
      font-size: 20px;
      margin: 15px 0;
      line-height: 1.5;
    }

    /* =========================
    BOTÃO
    ========================= */

    .quiz-window button {
      margin-top: 30px;
      background: #4DA6FF;
      border: 4px solid black;
      padding: 15px 25px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 8px 8px 0 black;
      transition: 0.15s;
    }

    .quiz-window button:hover {
      transform: translateY(-2px);
      box-shadow: 12px 12px 0 black;
    }

    .quiz-window button:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 black;
    }
  </style>
</head>

<body>

  <div class="quiz-window">

    <h1>🎉 Parabéns!</h1>

    <p>Você completou as primeiras lições do PopEnglish 🚀</p>

    <p>Isso já te coloca à frente de muita gente que ainda nem começou.</p>

    <p>✨ Em breve teremos mais conteúdo para você continuar evoluindo.</p>

    <p><strong>Stay tuned 👀</strong></p>

    <button onclick="window.location.href='dashboard.html'">
      Voltar ao início
    </button>

  </div>

</body>
</html>
